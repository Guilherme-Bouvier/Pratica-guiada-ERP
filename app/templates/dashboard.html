{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    <i class="bi bi-speedometer2"></i> Dashboard
</h2>

<div class="row g-4">

    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-box-seam display-4 text-primary"></i>

                <h5 class="mt-3">Produtos</h5>

                <h2 class="fw-bold">
                    {{ total_produtos }}
                </h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-tags display-4 text-success"></i>

                <h5 class="mt-3">Categorias</h5>

                <h2 class="fw-bold">
                    {{ total_categorias }}
                </h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-people display-4 text-warning"></i>

                <h5 class="mt-3">Usuários</h5>

                <h2 class="fw-bold">
                    {{ total_usuarios }}
                </h2>
            </div>
        </div>
    </div>

</div>

{% endblock %}
